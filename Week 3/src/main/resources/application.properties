# Server (sample requests in the docs use 8083; JWT doc curl examples use 8090 - adjust to taste)
server.port=8083

# Logging levels (Hands on 3)
logging.level.org.springframework=info
logging.level.com.cognizant.springlearn=debug

# Custom console log pattern from the hands-on
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n
