# using h2 in-memory database, no installation required
spring.datasource.url=jdbc:h2:mem:countrydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# lets hibernate create the table automatically from the Country class
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# enabling h2 web console so we can view the table in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
