server:
  port: 8080                   # everything reachable through http://localhost:8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # /accounts/** -> ACCOUNT-SERVICE (resolved through Eureka, load-balanced)
        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/accounts/**
        # /loans/** -> LOAN-SERVICE
        - id: loan-service
          uri: lb://LOAN-SERVICE
          predicates:
            - Path=/loans/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
